name: Style

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: style-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-format clang-format

      - name: Check formatting of changed lines
        run: |
          BASE=$(git merge-base HEAD origin/${{ github.base_ref }})
          DIFF=$(git clang-format --diff "$BASE")
          if echo "$DIFF" | grep -q '^diff'; then
            echo "$DIFF"
            echo ""
            echo "::error::Changed C/C++ lines are not correctly formatted."
            echo "::error::To fix, run: git clang-format ${{ github.base_ref }}"
            exit 1
          fi
          echo "All changed C/C++ files are correctly formatted."
